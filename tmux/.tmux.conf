# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shorter escape time
set -sg escape-time 10

# ── Catppuccin Mocha ──────────────────────────────────────
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

set -g status-right "#[fg=#585b70]#[bg=#585b70,fg=#cdd6f4] %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h "

set -g window-status-format "#[fg=#6c7086] #I #W "
set -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold] #I #W "

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"
